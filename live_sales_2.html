<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>物販管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #f2f2f7;
    --card: #ffffff;
    --accent: #007aff;
    --red: #ff3b30;
    --green: #34c759;
    --orange: #ff9500;
    --text: #1c1c1e;
    --sub: #8e8e93;
    --border: #e5e5ea;
    --radius: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Hiragino Sans', sans-serif;
    min-height: 100svh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== SETUP ===== */
  #setup-screen { padding: 0 0 48px; }

  .setup-header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .setup-header h1 { font-size: 1.1rem; font-weight: 700; text-align: center; }

  .section { margin: 20px 16px 0; }
  .section-title {
    font-size: 0.75rem;
    color: var(--sub);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
    padding-left: 4px;
  }

  .list-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .item-setup-row {
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
    gap: 8px;
  }
  .item-setup-row:last-child { border-bottom: none; }

  .item-setup-row input[type="text"] {
    flex: 1;
    background: none;
    border: none;
    font-family: inherit;
    font-size: 0.95rem;
    color: var(--text);
    padding: 13px 0;
    outline: none;
    min-width: 0;
  }
  .item-setup-row input[type="number"] {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 0.95rem;
    color: var(--accent);
    font-weight: 600;
    padding: 13px 0;
    outline: none;
    width: 90px;
    text-align: right;
  }
  .price-prefix { font-size: 0.85rem; color: var(--sub); }
  .del-btn {
    background: var(--red);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 1.1rem;
    width: 26px;
    height: 26px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .add-row-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--accent);
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 13px 16px;
    width: 100%;
    cursor: pointer;
    margin-top: 8px;
  }

  .cash-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
  }
  .cash-card label { font-size: 0.9rem; color: var(--sub); white-space: nowrap; }
  .cash-card input {
    flex: 1;
    background: none;
    border: none;
    font-family: inherit;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--orange);
    text-align: right;
    padding: 15px 0;
    outline: none;
  }
  .cash-card .yen-label { color: var(--sub); font-size: 0.9rem; }

  .info-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .info-row {
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    gap: 10px;
  }
  .info-row:last-child { border-bottom: none; }
  .info-row label { font-size: 0.85rem; color: var(--sub); white-space: nowrap; min-width: 60px; }
  .info-row input {
    flex: 1;
    background: none;
    border: none;
    font-family: inherit;
    font-size: 0.95rem;
    color: var(--text);
    padding: 13px 0;
    outline: none;
    text-align: right;
  }

  /* Sales header live name */
  .sales-event-label {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    text-align: center;
    padding: 6px 12px;
    font-size: 0.78rem;
    color: var(--sub);
    font-weight: 600;
  }
  .sales-event-label span { color: var(--text); }

  .start-btn {
    display: block;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-family: inherit;
    font-size: 1.05rem;
    font-weight: 700;
    padding: 16px;
    width: 100%;
    cursor: pointer;
    margin-top: 12px;
  }
  .start-btn:active { opacity: 0.8; }

  /* ===== SALES ===== */
  #sales-screen { padding-bottom: calc(env(safe-area-inset-bottom) + 72px); }

  .summary-bar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    position: sticky;
    top: 0;
    z-index: 10;
    padding: 10px 12px;
    gap: 8px;
  }
  .stat {
    background: var(--bg);
    border-radius: 10px;
    padding: 8px 6px;
    text-align: center;
  }
  .stat-label {
    font-size: 0.63rem;
    color: var(--sub);
    font-weight: 600;
    margin-bottom: 3px;
  }
  .stat-value {
    font-size: 1.15rem;
    font-weight: 800;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .stat-value.red { color: var(--red); }
  .stat-value.orange { color: var(--orange); }
  .stat-value.green { color: var(--green); }

  .item-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }

  .item-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    display: flex;
    align-items: stretch;
    overflow: hidden;
    transition: border-color 0.25s;
  }
  .item-card.flashed { border-color: var(--accent); background: #007aff0a; }

  .item-body {
    flex: 1;
    padding: 12px 14px;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 3px;
  }
  .item-name-label {
    font-size: 0.95rem;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-price-label { font-size: 0.8rem; color: var(--sub); }
  .item-price-label b { color: var(--text); font-weight: 700; }

  .item-right { display: flex; align-items: stretch; }

  .count-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 12px;
    border-right: 1px solid var(--border);
    min-width: 50px;
  }
  .count-num {
    font-size: 1.7rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .count-unit { font-size: 0.62rem; color: var(--sub); }

  .undo-btn {
    background: none;
    border: none;
    border-right: 1px solid var(--border);
    color: var(--sub);
    font-size: 1rem;
    padding: 0 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 38px;
  }
  .undo-btn:active { background: var(--bg); }

  .tap-btn {
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: inherit;
    padding: 0 14px;
    cursor: pointer;
    min-width: 62px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1px;
  }
  .tap-btn:active { background: #0051a8; }
  .tap-plus { font-size: 1.5rem; font-weight: 900; line-height: 1; }
  .tap-label { font-size: 0.62rem; opacity: 0.85; }

  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 20;
  }
  .bar-btn {
    flex: 1;
    background: none;
    border: none;
    border-right: 1px solid var(--border);
    font-family: inherit;
    font-size: 0.78rem;
    padding: 13px 8px;
    cursor: pointer;
    color: var(--sub);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .bar-btn:last-child { border-right: none; }
  .bar-btn .bar-icon { font-size: 1.2rem; }
  .bar-btn.green-btn { color: var(--green); }
  .bar-btn.red-btn { color: var(--red); }
  .bar-btn.blue-btn { color: var(--accent); }
  .bar-btn:active { background: var(--bg); }

  /* Modal */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 50;
    align-items: flex-end;
    justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal-sheet {
    background: var(--card);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px calc(env(safe-area-inset-bottom) + 20px);
    width: 100%;
    max-width: 480px;
  }
  .modal-sheet h3 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
  .modal-sheet p { font-size: 0.875rem; color: var(--sub); line-height: 1.6; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; }
  .modal-cancel {
    flex: 1; background: var(--bg); border: none; border-radius: 10px;
    font-family: inherit; font-size: 0.95rem; padding: 13px; cursor: pointer;
  }
  .modal-ok {
    flex: 1; background: var(--red); border: none; border-radius: 10px;
    color: #fff; font-family: inherit; font-size: 0.95rem; font-weight: 700;
    padding: 13px; cursor: pointer;
  }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup-screen" class="screen active">
  <div class="setup-header">
    <h1>物販設定</h1>
  </div>

  <div class="section">
    <div class="section-title">ライブ情報</div>
    <div class="info-card">
      <div class="info-row">
        <label>ライブ名</label>
        <input type="text" id="live-name" placeholder="例：ワンマンライブ 2026" inputmode="text">
      </div>
      <div class="info-row">
        <label>日付</label>
        <input type="date" id="live-date">
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">商品リスト</div>
    <div class="list-card" id="items-container"></div>
    <button class="add-row-btn" onclick="addRow()">＋ 商品を追加</button>
  </div>

  <div class="section">
    <div class="section-title">釣銭準備金</div>
    <div class="cash-card">
      <label>準備金</label>
      <span class="yen-label">¥</span>
      <input type="number" id="cash-fund" value="50000" min="0" step="1000" inputmode="numeric">
    </div>
  </div>

  <div class="section">
    <button class="start-btn" onclick="startSales()">販売開始 →</button>
  </div>
</div>

<!-- SALES -->
<div id="sales-screen" class="screen">
  <div class="sales-event-label" id="event-label"></div>
  <div class="summary-bar">
    <div class="stat">
      <div class="stat-label">売上金額</div>
      <div class="stat-value red" id="stat-sales">¥0</div>
    </div>
    <div class="stat">
      <div class="stat-label">売上個数</div>
      <div class="stat-value orange" id="stat-count">0個</div>
    </div>
    <div class="stat">
      <div class="stat-label">レジ残高</div>
      <div class="stat-value green" id="stat-register">¥0</div>
    </div>
  </div>

  <div class="item-list" id="sales-list"></div>

  <div class="bottom-bar">
    <button class="bar-btn green-btn" onclick="downloadCSV()">
      <span class="bar-icon">📥</span>CSV出力
    </button>
    <button class="bar-btn blue-btn" onclick="goSetup()">
      <span class="bar-icon">⚙️</span>設定変更
    </button>
    <button class="bar-btn red-btn" onclick="confirmReset()">
      <span class="bar-icon">🔄</span>リセット
    </button>
  </div>
</div>

<!-- Reset Modal -->
<div class="overlay" id="reset-overlay">
  <div class="modal-sheet">
    <h3>カウントをリセット</h3>
    <p>すべての売上カウントを0に戻します。商品リストと準備金はそのまま保持されます。</p>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
      <button class="modal-ok" onclick="doReset()">リセット</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'liveSalesData';
let items = [];
let cashFund = 50000;
let liveName = '';
let liveDate = '';
let rowId = 0;

// ===== STORAGE =====
function saveState() {
  const data = { items, cashFund, liveName, liveDate, screen: currentScreen() };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

function currentScreen() {
  return document.querySelector('.screen.active')?.id || 'setup-screen';
}

// ===== SETUP =====
function addRow(name = '', price = '') {
  const container = document.getElementById('items-container');
  const id = rowId++;
  const row = document.createElement('div');
  row.className = 'item-setup-row';
  row.dataset.id = id;
  row.innerHTML = `
    <button class="del-btn" onclick="removeRow(${id})">−</button>
    <input type="text" placeholder="商品名" class="name-in" value="${esc(name)}" inputmode="text">
    <span class="price-prefix">¥</span>
    <input type="number" placeholder="値段" class="price-in" value="${price}" min="0" step="100" inputmode="numeric">
  `;
  container.appendChild(row);
}

function removeRow(id) {
  document.querySelector(`.item-setup-row[data-id="${id}"]`)?.remove();
}

function startSales() {
  const rows = document.querySelectorAll('.item-setup-row');
  const newItems = [];
  rows.forEach(row => {
    const name = row.querySelector('.name-in').value.trim();
    const price = parseInt(row.querySelector('.price-in').value) || 0;
    if (name) newItems.push({ name, price, count: 0 });
  });
  if (newItems.length === 0) { alert('商品を1つ以上入力してください'); return; }
  items = newItems;
  cashFund = parseInt(document.getElementById('cash-fund').value) || 0;
  liveName = document.getElementById('live-name').value.trim();
  liveDate = document.getElementById('live-date').value;
  saveState();
  renderSales();
  switchScreen('sales-screen');
}

// ===== SALES =====
function renderSales() {
  // Event label
  const label = document.getElementById('event-label');
  const parts = [];
  if (liveDate) parts.push(liveDate.replace(/-/g, '/'));
  if (liveName) parts.push(liveName);
  label.innerHTML = parts.length ? `<span>${parts.join('　')}</span>` : '';
  label.style.display = parts.length ? 'block' : 'none';

  const list = document.getElementById('sales-list');
  list.innerHTML = '';
  items.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'item-card';
    card.id = `card-${i}`;
    card.innerHTML = `
      <div class="item-body">
        <div class="item-name-label">${esc(item.name)}</div>
        <div class="item-price-label">¥<b>${item.price.toLocaleString()}</b> / 個</div>
      </div>
      <div class="item-right">
        <div class="count-area">
          <div class="count-num" id="cnt-${i}">${item.count}</div>
          <div class="count-unit">個</div>
        </div>
        <button class="undo-btn" onclick="undoTap(${i})" title="1個戻す">↩</button>
        <button class="tap-btn" onclick="tap(${i})">
          <span class="tap-plus">+</span>
          <span class="tap-label">売れた</span>
        </button>
      </div>
    `;
    list.appendChild(card);
  });
  updateStats();
}

function tap(i) {
  items[i].count++;
  document.getElementById(`cnt-${i}`).textContent = items[i].count;
  const card = document.getElementById(`card-${i}`);
  card.classList.add('flashed');
  setTimeout(() => card.classList.remove('flashed'), 300);
  updateStats();
  saveState();
}

function undoTap(i) {
  if (items[i].count <= 0) return;
  items[i].count--;
  document.getElementById(`cnt-${i}`).textContent = items[i].count;
  updateStats();
  saveState();
}

function updateStats() {
  const totalSales = items.reduce((s, it) => s + it.price * it.count, 0);
  const totalCount = items.reduce((s, it) => s + it.count, 0);
  document.getElementById('stat-sales').textContent = '¥' + totalSales.toLocaleString();
  document.getElementById('stat-count').textContent = totalCount + '個';
  document.getElementById('stat-register').textContent = '¥' + (cashFund + totalSales).toLocaleString();
}

// ===== RESET =====
function confirmReset() { document.getElementById('reset-overlay').classList.add('open'); }
function closeModal() { document.getElementById('reset-overlay').classList.remove('open'); }
function doReset() {
  items.forEach(it => it.count = 0);
  closeModal();
  renderSales();
  saveState();
}

// ===== CSV =====
function downloadCSV() {
  const totalSales = items.reduce((s, it) => s + it.price * it.count, 0);
  const totalCount = items.reduce((s, it) => s + it.count, 0);
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const dateStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${pad(now.getMinutes())}`;

  let csv = '\uFEFF';
  if (liveName) csv += `ライブ名,${liveName}\n`;
  if (liveDate) csv += `開催日,${liveDate.replace(/-/g, '/')}\n`;
  csv += `出力日時,${dateStr}\n`;
  csv += `釣銭準備金,${cashFund}\n\n`;
  csv += `商品名,単価,売上個数,小計\n`;
  items.forEach(it => {
    csv += `${it.name},${it.price},${it.count},${it.price * it.count}\n`;
  });
  csv += `\n合計,,${totalCount},${totalSales}\n`;
  csv += `レジ残高,,,${cashFund + totalSales}\n`;

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const prefix = liveName ? liveName.replace(/\s/g,'_') : '売上';
  const fn = `${prefix}_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}.csv`;
  a.download = fn;
  a.click();
  URL.revokeObjectURL(url);
}

// ===== NAV =====
function goSetup() {
  const container = document.getElementById('items-container');
  container.innerHTML = '';
  items.forEach(it => addRow(it.name, it.price));
  document.getElementById('live-name').value = liveName;
  document.getElementById('live-date').value = liveDate;
  document.getElementById('cash-fund').value = cashFund;
  switchScreen('setup-screen');
}

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ===== UTIL =====
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== INIT =====
(function init() {
  // Set today as default date
  const today = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('live-date').value =
    `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

  const saved = loadState();
  if (saved && saved.items && saved.items.length > 0) {
    items = saved.items;
    cashFund = saved.cashFund ?? 50000;
    liveName = saved.liveName ?? '';
    liveDate = saved.liveDate ?? '';
    // Restore setup form
    saved.items.forEach(it => addRow(it.name, it.price));
    document.getElementById('live-name').value = liveName;
    document.getElementById('live-date').value = liveDate;
    document.getElementById('cash-fund').value = cashFund;
    // If was on sales screen, go back there
    if (saved.screen === 'sales-screen') {
      renderSales();
      switchScreen('sales-screen');
    }
  } else {
    for (let i = 0; i < 5; i++) addRow();
  }
})();
</script>
</body>
</html>
